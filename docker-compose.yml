services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      # O MySQL usa essas variáveis específicas para se auto-configurar
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
    ports:
      - "${DB_PORT}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  app:
    build: .
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env # Injeta todas as variáveis do .env dentro do container Node